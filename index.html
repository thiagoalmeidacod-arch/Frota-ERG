<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestão de Frotas — ERG Engenharia</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --erg-blue: #1a3a5c; --erg-orange: #e07020; --erg-blue-light: #2a5080; --font-sans: system-ui, -apple-system, sans-serif; }
  body { font-family: var(--font-sans); background: #f0f2f5; min-height: 100vh; }

  .header { background: var(--erg-blue); border-bottom: 4px solid var(--erg-orange); }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 12px 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-logo { display: flex; align-items: center; gap: 14px; }
  .header-logo img { height: 52px; border-radius: 6px; }
  .header-title { color: #fff; font-size: 20px; font-weight: 500; }
  .header-title span { color: var(--erg-orange); }
  .header-clock { color: rgba(255,255,255,0.75); font-size: 12px; text-align: right; }

  .nav { background: var(--erg-blue); border-bottom: 1px solid rgba(255,255,255,0.1); }
  .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; gap: 4px; }
  .nav-btn { padding: 10px 18px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.65); background: transparent; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-family: var(--font-sans); transition: all 0.15s; }
  .nav-btn:hover { color: #fff; }
  .nav-btn.ativo { color: #fff; border-bottom-color: var(--erg-orange); }

  .wrap { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
  .aba { display: none; }
  .aba.ativa { display: block; }

  .busca-input { width: 100%; max-width: 400px; padding: 9px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: var(--font-sans); outline: none; transition: border-color 0.15s; margin-bottom: 1rem; }
  .busca-input:focus { border-color: var(--erg-blue); }

  .summary-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
  .badge { font-size: 12px; padding: 4px 12px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; user-select: none; }
  .badge:hover { opacity: 0.8; }
  .badge.ativo { border: 2px solid currentColor; font-weight: 700; }
  .badge-disp  { background: #EAF3DE; color: #2d5a0e; }
  .badge-manut { background: #FCEBEB; color: #A32D2D; }
  .badge-mobil { background: #FEF3CD; color: #7a5200; }
  .badge-agend { background: #DFF3E3; color: #1a6630; }
  .badge-locac { background: #FCEBEB; color: #7a0000; }
  .badge-subst { background: #FFF0E6; color: #7a3500; }
  .badge-conc  { background: #E6F1FB; color: #185FA5; }
  .filtro-label { font-size: 11px; color: #999; align-self: center; cursor: pointer; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); border-top: 3px solid var(--erg-blue); padding: 1rem 1.25rem; cursor: pointer; transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 2px 12px rgba(26,58,92,0.12); }
  .card.manut     { border-top-color: #E24B4A; }
  .card.mobil     { border-top-color: #f0b429; }
  .card.agend     { border-top-color: #3aad5c; }
  .card.locac     { border-top-color: #b00000; }
  .card.subst     { border-top-color: #e07020; }
  .card.concluido { border-top-color: #378ADD; opacity: 0.85; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 4px; }
  .card-placa  { font-size: 15px; font-weight: 600; color: var(--erg-blue); letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-disp { background: #639922; } .dot-manut { background: #E24B4A; } .dot-mobil { background: #f0b429; }
  .dot-agend { background: #3aad5c; } .dot-locac { background: #b00000; } .dot-subst { background: #e07020; } .dot-concluido { background: #378ADD; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 8px; font-weight: 500; }
  .tag-disp { background: #EAF3DE; color: #3B6D11; } .tag-manut { background: #FCEBEB; color: #A32D2D; }
  .tag-mobil { background: #FEF3CD; color: #7a5200; } .tag-agend { background: #DFF3E3; color: #1a6630; }
  .tag-locac { background: #FCEBEB; color: #7a0000; } .tag-subst { background: #FFF0E6; color: #7a3500; } .tag-concluido { background: #E6F1FB; color: #185FA5; }
  .card-info { font-size: 12px; color: #666; line-height: 1.8; margin-top: 4px; }
  .card-info span { color: #1a1a1a; font-weight: 500; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; flex-wrap: wrap; gap: 4px; }
  .vinculo-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
  .vinculo-proprio { background: #E6F1FB; color: #185FA5; } .vinculo-locado { background: #FFF0E6; color: #7a3500; }
  .prazo-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
  .prazo-ok { background: #EAF3DE; color: #2d5a0e; } .prazo-atraso { background: #FCEBEB; color: #A32D2D; }
  .prazo-concluido-ok { background: #EAF3DE; color: #2d5a0e; } .prazo-concluido-atraso { background: #FCEBEB; color: #A32D2D; }
  .btn-hist { font-size: 10px; color: #999; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; font-family: var(--font-sans); }
  .btn-hist:hover { color: var(--erg-blue); }

  .add-btn { margin-top: 1.5rem; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
  button.add { font-size: 13px; padding: 9px 24px; border-radius: 8px; border: 1.5px solid var(--erg-orange); background: transparent; color: var(--erg-orange); cursor: pointer; font-family: var(--font-sans); font-weight: 500; transition: background 0.15s; }
  button.add:hover { background: rgba(224,112,32,0.08); }
  button.exportar { font-size: 13px; padding: 9px 24px; border-radius: 8px; border: 1.5px solid var(--erg-blue); background: transparent; color: var(--erg-blue); cursor: pointer; font-family: var(--font-sans); font-weight: 500; transition: background 0.15s; }
  button.exportar:hover { background: rgba(26,58,92,0.06); }

  .status-bar { font-size: 11px; color: #999; text-align: center; margin-top: 1rem; }
  .loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 12px; border-top: 4px solid var(--erg-orange); padding: 1.5rem; width: 380px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.18); max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; color: var(--erg-blue); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 500; }
  .field input, .field select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fff; color: #1a1a1a; font-family: var(--font-sans); outline: none; transition: border-color 0.15s; }
  .field input:focus, .field select:focus { border-color: var(--erg-blue); }
  .field .hint { font-size: 11px; color: #999; margin-top: 3px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-save { flex: 1; background: var(--erg-blue); border: none; border-radius: 8px; padding: 9px; font-size: 13px; cursor: pointer; font-weight: 600; color: #fff; font-family: var(--font-sans); }
  .btn-save:hover { background: var(--erg-blue-light); }
  .btn-del { padding: 9px 14px; background: transparent; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; color: #A32D2D; font-family: var(--font-sans); }
  .btn-del:hover { background: #FCEBEB; }
  .btn-cancel { padding: 9px 14px; background: transparent; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; color: #666; font-family: var(--font-sans); }
  .btn-cancel:hover { background: #f5f5f5; }
  .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; font-size: 12px; color: #999; }
  .upload-area:hover { border-color: var(--erg-blue); color: var(--erg-blue); }
  .anexo-link { font-size: 12px; color: var(--erg-blue); text-decoration: underline; display: block; margin-top: 4px; }

  .hist-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .hist-modal { background: #fff; border-radius: 12px; border-top: 4px solid var(--erg-blue); padding: 1.5rem; width: 420px; max-width: 95vw; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .hist-modal h2 { font-size: 15px; font-weight: 600; color: var(--erg-blue); margin-bottom: 1rem; }
  .hist-item { padding: 10px 0; border-bottom: 0.5px solid #eee; font-size: 12px; }
  .hist-item:last-child { border-bottom: none; }
  .hist-data { font-size: 11px; color: #999; margin-bottom: 2px; }

  .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .dash-card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 1rem 1.25rem; }
  .dash-card h3 { font-size: 12px; color: #999; font-weight: 500; margin-bottom: 6px; }
  .dash-card .num { font-size: 28px; font-weight: 600; color: var(--erg-blue); }
  .dash-section { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 1.25rem; margin-bottom: 1rem; }
  .dash-section h3 { font-size: 14px; font-weight: 600; color: var(--erg-blue); margin-bottom: 1rem; }
  .pizza-wrap { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
  .legenda { display: flex; flex-direction: column; gap: 6px; }
  .leg-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; }
  .leg-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .timeline { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
  .tl-item { display: flex; gap: 12px; align-items: flex-start; font-size: 12px; }
  .tl-data { color: #999; min-width: 80px; font-size: 11px; }
  .tl-placa { font-weight: 600; color: var(--erg-blue); }
  .filtro-contrato-wrap { margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-logo">
      <img src="logo.png" alt="ERG" onerror="this.style.display='none'" />
      <div>
        <div class="header-title">Gestão de <span>Frotas</span></div>
        <div style="color:rgba(255,255,255,0.6);font-size:11px;margin-top:2px;">ERG Engenharia · Meio Ambiente · Geotecnologias</div>
      </div>
    </div>
    <div class="header-clock" id="clock"></div>
  </div>
</div>

<div class="nav">
  <div class="nav-inner">
    <button class="nav-btn ativo" onclick="mudarAba('frota',this)">🚗 Frota</button>
    <button class="nav-btn" onclick="mudarAba('dashboard',this)">📊 Dashboard</button>
    <button class="nav-btn" onclick="mudarAba('relatorio',this)">📄 Relatório</button>
  </div>
</div>

<div class="wrap">

  <!-- ABA FROTA -->
  <div id="aba-frota" class="aba ativa">
    <input id="busca-placa" class="busca-input" type="text" placeholder="🔍 Buscar por placa ou identificação..." oninput="window._buscar(this.value)" />
    <div class="summary-row" id="summary"></div>
    <div id="grid" class="grid"><div class="loading">Carregando veículos...</div></div>
    <div class="add-btn">
      <button class="add" onclick="openNew()">+ Adicionar veículo</button>
    </div>
    <div class="status-bar" id="status-bar">Conectando ao banco de dados...</div>
  </div>

  <!-- ABA DASHBOARD -->
  <div id="aba-dashboard" class="aba">
    <div class="filtro-contrato-wrap" style="gap:12px;flex-wrap:wrap;align-items:flex-end;">
      <div>
        <div style="font-size:11px;color:#999;margin-bottom:4px;font-weight:500;">Centro de custo / Contrato</div>
        <input id="filtro-contrato" class="busca-input" style="margin-bottom:0;min-width:240px;" type="text" placeholder="🔍 Ex: 6180, VALE..." oninput="window._filtrarContrato(this.value)" />
      </div>
      <div>
        <div style="font-size:11px;color:#999;margin-bottom:4px;font-weight:500;">Período — de</div>
        <input id="filtro-data-de" class="busca-input" style="margin-bottom:0;width:160px;" type="date" onchange="window._filtrarData()" />
      </div>
      <div>
        <div style="font-size:11px;color:#999;margin-bottom:4px;font-weight:500;">até</div>
        <input id="filtro-data-ate" class="busca-input" style="margin-bottom:0;width:160px;" type="date" onchange="window._filtrarData()" />
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <div style="font-size:11px;color:transparent;">.</div>
        <button onclick="window._limparFiltrosDash()" style="padding:9px 16px;border-radius:8px;border:1.5px solid #ddd;background:transparent;color:#999;cursor:pointer;font-size:12px;font-family:var(--font-sans);">✕ Limpar</button>
      </div>
      <span id="filtro-contrato-label" style="font-size:12px;color:var(--erg-orange);font-weight:500;align-self:center;"></span>
    </div>
    <div class="dash-grid" id="dash-cards"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
      <div class="dash-section">
        <h3>Distribuição por status</h3>
        <div class="pizza-wrap">
          <canvas id="pizza-canvas" width="160" height="160"></canvas>
          <div class="legenda" id="pizza-legenda"></div>
        </div>
      </div>
      <div class="dash-section">
        <h3>Custo total por centro de custo</h3>
        <div class="pizza-wrap">
          <canvas id="pizza-cc-canvas" width="160" height="160"></canvas>
          <div class="legenda" id="pizza-cc-legenda"></div>
        </div>
      </div>
      <div class="dash-section">
        <h3>Últimas movimentações</h3>
        <div class="timeline" id="dash-timeline"></div>
      </div>
    </div>
  </div>

  <!-- ABA RELATÓRIO -->
  <div id="aba-relatorio" class="aba">
    <div style="background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);padding:1.25rem;margin-bottom:1rem;">
      <h3 style="font-size:14px;font-weight:600;color:var(--erg-blue);margin-bottom:1rem;">Filtros do relatório</h3>
      <div class="two-col" style="max-width:500px;">
        <div class="field"><label>Status</label>
          <select id="rel-status">
            <option value="">Todos</option>
            <option value="disponivel">Disponível</option>
            <option value="manutencao">Em manutenção</option>
            <option value="mobilizacao">Em mobilização</option>
            <option value="agendado">Manut. agendada</option>
            <option value="locacao">Locação</option>
            <option value="substituicao">Substituição</option>
            <option value="concluido">Concluído</option>
          </select></div>
        <div class="field"><label>Tipo</label>
          <select id="rel-vinculo">
            <option value="">Todos</option>
            <option value="Próprio">Próprio</option>
            <option value="Locado">Locado</option>
          </select></div>
      </div>
      <div class="add-btn" style="justify-content:flex-start;margin-top:8px;">
        <button class="exportar" onclick="exportarExcel()">⬇ Exportar Excel</button>
        <button class="exportar" onclick="exportarPDF()">⬇ Exportar PDF</button>
      </div>
    </div>
    <div id="rel-tabela"></div>
  </div>

</div>

<div id="modal" style="display:none"></div>
<div id="hist-modal" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy, getDocs }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import emailjs from "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/+esm";

  emailjs.init('55ZqdyFKq56zbhXgu');

  const firebaseConfig = {
    apiKey: "AIzaSyBWurnJOeq29n0NncjnLlf_krpq19vPIkM",
    authDomain: "frota-erg.firebaseapp.com",
    projectId: "frota-erg",
    storageBucket: "frota-erg.firebasestorage.app",
    messagingSenderId: "267421435604",
    appId: "1:267421435604:web:ca257c03eb3ae420a41d41"
  };

  const app     = initializeApp(firebaseConfig);
  const db      = getFirestore(app);
  const col     = collection(db, "veiculos");

  let veiculos       = [];
  let editId         = null;
  let filtroAtivo    = null;
  let buscaPlaca     = "";
  let filtroContrato = "";
  let filtroDataDe   = "";
  let filtroDataAte  = "";

  // ── UTILITÁRIOS ──────────────────────────────────────────────────
  function fmtData(d) {
    if (!d) return '';
    const [y,m,dd] = d.split('-');
    return dd+'/'+m+'/'+y;
  }
  function hojeStr() { return new Date().toISOString().split('T')[0]; }
  function diasDesde(d) {
    if (!d) return '';
    const dt = new Date(d+'T00:00:00'), h = new Date(); h.setHours(0,0,0,0);
    const diff = Math.round((h-dt)/86400000);
    return diff===0?'hoje':diff===1?'1 dia':diff+' dias';
  }
  function verificaPrazo(dl) {
    if (!dl) return null;
    return new Date(dl+'T00:00:00') < (()=>{const h=new Date();h.setHours(0,0,0,0);return h;})() ? 'atraso':'ok';
  }
  function prazoNaConclusao(dl,dc) {
    if (!dl||!dc) return null;
    return new Date(dc+'T00:00:00') <= new Date(dl+'T00:00:00') ? 'ok':'atraso';
  }
  function parseValor(v) {
    return parseFloat((v||'0').replace(/\./g,'').replace(',','.')) || 0;
  }

  // ── STATUS ───────────────────────────────────────────────────────
  function getStatusInfo(s) {
    if (s==='manutencao')   return {label:'Manutenção',      tag:'tag-manut',     dot:'dot-manut',     card:'manut'    };
    if (s==='mobilizacao')  return {label:'Em mobilização',  tag:'tag-mobil',     dot:'dot-mobil',     card:'mobil'    };
    if (s==='agendado')     return {label:'Manut. agendada', tag:'tag-agend',     dot:'dot-agend',     card:'agend'    };
    if (s==='locacao')      return {label:'Locação',         tag:'tag-locac',     dot:'dot-locac',     card:'locac'    };
    if (s==='substituicao') return {label:'Substituição',    tag:'tag-subst',     dot:'dot-subst',     card:'subst'    };
    if (s==='concluido')    return {label:'Concluído',       tag:'tag-concluido', dot:'dot-concluido', card:'concluido'};
    return                         {label:'Disponível',      tag:'tag-disp',      dot:'dot-disp',      card:''         };
  }
  function labelStatus(s) { return getStatusInfo(s).label; }

  // ── PRAZO / VÍNCULO TAGS ─────────────────────────────────────────
  function tagPrazoHTML(v) {
    if (v.status==='disponivel') return '';
    const dl = v.status==='locacao' ? v.desde : v.prazo;
    if (v.status==='concluido') {
      const st = prazoNaConclusao(dl, v.dataConclusao);
      if (!st) return '';
      return st==='ok'
        ? '<span class="prazo-tag prazo-concluido-ok">✓ Concluído no prazo</span>'
        : '<span class="prazo-tag prazo-concluido-atraso">✓ Concluído em atraso</span>';
    }
    const st = verificaPrazo(dl);
    if (!st) return '';
    return st==='atraso'
      ? '<span class="prazo-tag prazo-atraso">⚠ Em atraso</span>'
      : '<span class="prazo-tag prazo-ok">✓ No prazo</span>';
  }
  function tagVinculo(v) {
    if (!v.vinculo) return '';
    return v.vinculo==='Próprio'
      ? '<span class="vinculo-tag vinculo-proprio">Próprio</span>'
      : '<span class="vinculo-tag vinculo-locado">Locado</span>';
  }

  // ── E-MAIL ───────────────────────────────────────────────────────
  async function enviarEmail(emails, assunto, msg) {
    if (!emails) return;
    for (const email of emails.split(/[,;]/).map(e=>e.trim()).filter(Boolean)) {
      try { await emailjs.send('service_mc9majh','template_2xdqcfs',{to_email:email,subject:assunto,message:msg}); }
      catch(e) { console.warn('Email erro:', e); }
    }
  }
  function montarMsg(v, titulo) {
    return [
      'Olá,','',titulo,'',
      'Veículo: '+v.placa,
      'Tipo: '+(v.vinculo||'—'),
      'C. Custo: '+(v.cc||'—'),
      v.km         ? 'KM: '+v.km                          : null,
      v.tipoManut  ? 'Tipo manutenção: '+v.tipoManut       : null,
      v.local      ? 'Local: '+v.local                    : null,
      v.desde      ? 'Início: '+fmtData(v.desde)          : null,
      v.prazo      ? 'Prazo: '+fmtData(v.prazo)           : null,
      v.valor      ? 'Custo total: R$ '+v.valor           : null,
      v.padrao     ? 'Padrão: '+v.padrao                  : null,

      '','Atenciosamente,','ERG Engenharia — Gestão de Frotas'
    ].filter(l=>l!==null).join('\n');
  }

  // ── HISTÓRICO ────────────────────────────────────────────────────
  async function registrarHistorico(veiculoId, descricao) {
    try { await addDoc(collection(db,'veiculos',veiculoId,'historico'), {descricao, data: new Date().toISOString()}); }
    catch(e) { console.warn('Histórico erro:', e); }
  }

  window._verHistorico = async function(id, placa) {
    const snap = await getDocs(query(collection(db,'veiculos',id,'historico'), orderBy('data','desc')));
    const items = snap.docs.map(d=>d.data());
    const linhas = items.length===0
      ? '<div style="text-align:center;padding:1rem;color:#aaa;font-size:13px;">Nenhuma alteração registrada ainda.</div>'
      : items.map(h=>{
          const dt = new Date(h.data);
          const str = dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
          return '<div class="hist-item"><div class="hist-data">'+str+'</div><div>'+h.descricao+'</div></div>';
        }).join('');
    document.getElementById('hist-modal').innerHTML =
      '<div class="hist-bg" onclick="if(event.target===this)document.getElementById(\'hist-modal\').style.display=\'none\'">'+
      '<div class="hist-modal"><h2>Histórico — '+placa+'</h2>'+linhas+
      '<div style="margin-top:1rem;text-align:right"><button class="btn-cancel" onclick="document.getElementById(\'hist-modal\').style.display=\'none\'">Fechar</button></div>'+
      '</div></div>';
    document.getElementById('hist-modal').style.display = '';
  };

  // ── RENDER ───────────────────────────────────────────────────────
  function render() {
    const counts = {disponivel:0,manutencao:0,mobilizacao:0,agendado:0,locacao:0,substituicao:0,concluido:0};
    veiculos.forEach(v=>{if(counts[v.status]!==undefined)counts[v.status]++;});

    const a = filtroAtivo;
    const mkBadge = (st,cls,n,lbl) =>
      '<span class="badge '+cls+(a===st?' ativo':'')+'" onclick="window._filtrar(\''+st+'\')">'+n+lbl+'</span>';
    document.getElementById('summary').innerHTML =
      mkBadge('disponivel',  'badge-disp',  counts.disponivel,   counts.disponivel===1?' disponível':' disponíveis') +
      mkBadge('manutencao',  'badge-manut', counts.manutencao,   ' em manutenção') +
      mkBadge('mobilizacao', 'badge-mobil', counts.mobilizacao,  ' em mobilização') +
      mkBadge('agendado',    'badge-agend', counts.agendado,     counts.agendado===1?' manut. agendada':' manut. agendadas') +
      mkBadge('locacao',     'badge-locac', counts.locacao,      ' em locação') +
      mkBadge('substituicao','badge-subst', counts.substituicao, counts.substituicao===1?' substituição':' substituições') +
      mkBadge('concluido',   'badge-conc',  counts.concluido,    counts.concluido===1?' concluído':' concluídos') +
      (filtroAtivo?'<span class="filtro-label" onclick="window._filtrar(null)">✕ limpar filtro</span>':'');

    let lista = filtroAtivo ? veiculos.filter(v=>v.status===filtroAtivo) : veiculos;
    if (buscaPlaca) lista = lista.filter(v=>v.placa&&v.placa.toLowerCase().includes(buscaPlaca.toLowerCase()));

    if (lista.length===0) {
      document.getElementById('grid').innerHTML = '<div class="loading">'+(filtroAtivo||buscaPlaca?'Nenhum veículo encontrado.':'Nenhum veículo cadastrado.')+'</div>';
    } else {
      document.getElementById('grid').innerHTML = lista.map(v=>{
        const info = getStatusInfo(v.status);
        let inf = '';
        if (v.cc)  inf += 'C. Custo: <span>'+v.cc+'</span><br>';
        if (v.km)  inf += 'KM: <span>'+v.km+'</span><br>';

        if (v.status==='manutencao') {
          if (v.tipoManut) inf += 'Tipo: <span>'+v.tipoManut+'</span><br>';
          if (v.local)     inf += 'Local: <span>'+v.local+'</span><br>';
          if (v.desde)     inf += 'Início: <span>'+fmtData(v.desde)+'</span> <span style="color:#999">('+diasDesde(v.desde)+')</span><br>';
          if (v.prazo)     inf += 'Prazo: <span>'+fmtData(v.prazo)+'</span><br>';
        } else if (v.status==='substituicao') {
          if (v.local)  inf += 'Local: <span>'+v.local+'</span><br>';
          if (v.desde)  inf += 'Início: <span>'+fmtData(v.desde)+'</span> <span style="color:#999">('+diasDesde(v.desde)+')</span><br>';
          if (v.prazo)  inf += 'Prazo: <span>'+fmtData(v.prazo)+'</span><br>';
        } else if (v.status==='mobilizacao') {
          if (v.desde) inf += 'Início: <span>'+fmtData(v.desde)+'</span> <span style="color:#999">('+diasDesde(v.desde)+')</span><br>';
          if (v.prazo) inf += 'Prazo: <span>'+fmtData(v.prazo)+'</span><br>';
        } else if (v.status==='agendado') {
          if (v.local)  inf += 'Local: <span>'+v.local+'</span><br>';
          if (v.desde)  inf += 'Início: <span>'+fmtData(v.desde)+'</span><br>';
          if (v.prazo)  inf += 'Conclusão: <span>'+fmtData(v.prazo)+'</span><br>';
        } else if (v.status==='locacao') {
          if (v.padrao) inf += 'Padrão: <span>'+v.padrao+'</span><br>';
          if (v.valor)  inf += 'Custo total: <span>R$ '+v.valor+'</span><br>';
          if (v.desde)  inf += 'Limite: <span>'+fmtData(v.desde)+'</span><br>';
        } else if (v.status==='concluido') {
          if (v.tipoManut) inf += 'Tipo: <span>'+v.tipoManut+'</span><br>';
          if (v.local)     inf += 'Local: <span>'+v.local+'</span><br>';
          if (v.desde)     inf += 'Início: <span>'+fmtData(v.desde)+'</span><br>';
          if (v.prazo)     inf += 'Prazo: <span>'+fmtData(v.prazo)+'</span><br>';
          if (v.valor)     inf += 'Custo total: <span>R$ '+v.valor+'</span><br>';
          if (v.padrao)    inf += 'Padrão: <span>'+v.padrao+'</span><br>';
        } else {
          inf += '<span style="color:#aaa">Sem ocorrências</span>';
        }

        if (v.obs)             inf += 'Obs: <span>'+v.obs+'</span><br>';
        if (v.emailResponsavel) inf += 'Resp.: <span>'+v.emailResponsavel+'</span><br>';

        return '<div class="card '+info.card+'" onclick="window._openEdit(\''+v.id+'\')">'+
          '<div class="card-header"><span class="card-placa"><span class="dot '+info.dot+'"></span>'+v.placa+'</span><span class="tag '+info.tag+'">'+info.label+'</span></div>'+
          '<div class="card-info">'+inf+'</div>'+
          '<div class="card-footer">'+tagVinculo(v)+tagPrazoHTML(v)+
            '<button class="btn-hist" onclick="event.stopPropagation();window._verHistorico(\''+v.id+'\',\''+v.placa+'\')">Ver histórico</button>'+
          '</div>'+
        '</div>';
      }).join('');
    }

    renderDashboard();
    renderRelatorio();
  }

  // ── DASHBOARD ────────────────────────────────────────────────────
  function renderDashboard() {
    const vFiltrados = veiculos.filter(v => {
      const ccOk   = !filtroContrato || String(v.cc||'').toLowerCase().includes(filtroContrato.toLowerCase());
      const dataRef = v.desde || v.dataConclusao || '';
      const deOk   = !filtroDataDe  || dataRef >= filtroDataDe;
      const ateOk  = !filtroDataAte || dataRef <= filtroDataAte;
      return ccOk && deOk && ateOk;
    });

    const total     = veiculos.length;
    const ativos    = veiculos.filter(v=>v.status!=='disponivel'&&v.status!=='concluido').length;
    const valorTotal= vFiltrados.filter(v=>v.valor).reduce((s,v)=>s+parseValor(v.valor),0);

    // Atualizar label do filtro
    const partes = [];
    if (filtroContrato) partes.push('CC: '+filtroContrato);
    if (filtroDataDe)   partes.push('De: '+fmtData(filtroDataDe));
    if (filtroDataAte)  partes.push('Até: '+fmtData(filtroDataAte));
    document.getElementById('filtro-contrato-label').textContent = partes.length>0 ? '📊 '+partes.join(' · ') : '';

    document.getElementById('dash-cards').innerHTML =
      dc('Total de veículos', total) +
      dc('Em operação/ocorrência', ativos) +
      dc('Disponíveis', veiculos.filter(v=>v.status==='disponivel').length) +
      dc('Custo total acumulado', 'R$ '+valorTotal.toLocaleString('pt-BR',{minimumFractionDigits:2}));

    // Pizza status
    const counts = {disponivel:0,manutencao:0,mobilizacao:0,agendado:0,locacao:0,substituicao:0,concluido:0};
    veiculos.forEach(v=>{if(counts[v.status]!==undefined)counts[v.status]++;});
    const coresStatus = {disponivel:'#639922',manutencao:'#E24B4A',mobilizacao:'#f0b429',agendado:'#3aad5c',locacao:'#b00000',substituicao:'#e07020',concluido:'#378ADD'};
    const itens = Object.entries(counts).filter(([,n])=>n>0);
    const tot   = itens.reduce((s,[,n])=>s+n,0);
    drawPizza('pizza-canvas', itens.map(([st,n])=>({label:labelStatus(st)+' ('+n+')', valor:n, cor:coresStatus[st]||'#ccc'})), tot);
    document.getElementById('pizza-legenda').innerHTML = itens.map(([st,n])=>
      '<div class="leg-item"><div class="leg-dot" style="background:'+coresStatus[st]+'"></div>'+labelStatus(st)+' ('+n+')</div>'
    ).join('');

    // Pizza custo por CC
    const coresPaleta = ['#1a3a5c','#e07020','#3aad5c','#E24B4A','#f0b429','#378ADD','#b00000','#639922','#9b59b6','#16a085'];
    const custoCC = {};
    vFiltrados.filter(v=>v.valor&&v.cc).forEach(v=>{
      const val = parseValor(v.valor);
      if (val>0) custoCC[v.cc] = (custoCC[v.cc]||0)+val;
    });
    const ccItens = Object.entries(custoCC).sort((a,b)=>b[1]-a[1]);
    const totCC   = ccItens.reduce((s,[,v])=>s+v,0);
    if (ccItens.length===0) {
      const cv = document.getElementById('pizza-cc-canvas');
      const cx = cv.getContext('2d');
      cx.clearRect(0,0,160,160); cx.fillStyle='#eee'; cx.beginPath(); cx.arc(80,80,70,0,2*Math.PI); cx.fill();
      document.getElementById('pizza-cc-legenda').innerHTML = '<div style="font-size:11px;color:#aaa;">Nenhum custo registrado</div>';
    } else {
      drawPizza('pizza-cc-canvas', ccItens.map(([cc,v],i)=>({label:cc+' — R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2}), valor:v, cor:coresPaleta[i%coresPaleta.length]})), totCC);
      document.getElementById('pizza-cc-legenda').innerHTML = ccItens.map(([cc,v],i)=>
        '<div class="leg-item"><div class="leg-dot" style="background:'+coresPaleta[i%coresPaleta.length]+'"></div>'+
        cc+' — R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div>'
      ).join('');
    }

    // Timeline
    document.getElementById('dash-timeline').innerHTML = '<div style="color:#aaa;font-size:12px;">Carregando...</div>';
    Promise.all(veiculos.slice(0,20).map(async v=>{
      const snap = await getDocs(query(collection(db,'veiculos',v.id,'historico'),orderBy('data','desc')));
      return snap.docs.slice(0,3).map(d=>({...d.data(),placa:v.placa}));
    })).then(results=>{
      const todos = results.flat().sort((a,b)=>b.data.localeCompare(a.data)).slice(0,15);
      document.getElementById('dash-timeline').innerHTML = todos.length===0
        ? '<div style="color:#aaa;font-size:12px;">Nenhuma movimentação ainda.</div>'
        : todos.map(h=>{
            const dt = new Date(h.data);
            const str = dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
            return '<div class="tl-item"><div class="tl-data">'+str+'</div><div><span class="tl-placa">'+h.placa+'</span> — '+h.descricao+'</div></div>';
          }).join('');
    });
  }

  function dc(titulo, valor) {
    return '<div class="dash-card"><h3>'+titulo+'</h3><div class="num">'+valor+'</div></div>';
  }
  function drawPizza(canvasId, itens, total) {
    const cv = document.getElementById(canvasId);
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,160,160);
    let ang = -Math.PI/2;
    itens.forEach(item=>{
      const fatia = (item.valor/total)*2*Math.PI;
      ctx.beginPath(); ctx.moveTo(80,80);
      ctx.arc(80,80,70,ang,ang+fatia);
      ctx.closePath(); ctx.fillStyle=item.cor; ctx.fill();
      ang += fatia;
    });
  }

  // ── RELATÓRIO ────────────────────────────────────────────────────
  function filtrarRelatorio() {
    const st = document.getElementById('rel-status').value;
    const vn = document.getElementById('rel-vinculo').value;
    return veiculos.filter(v=>(!st||v.status===st)&&(!vn||v.vinculo===vn));
  }
  function renderRelatorio() {
    const lista = filtrarRelatorio();
    if (lista.length===0) { document.getElementById('rel-tabela').innerHTML='<div class="loading">Nenhum veículo encontrado.</div>'; return; }
    const rows = lista.map(v=>`<tr style="border-bottom:0.5px solid #eee;">
      <td style="padding:8px">${v.placa}</td><td style="padding:8px">${labelStatus(v.status)}</td>
      <td style="padding:8px">${v.tipoManut||'—'}</td><td style="padding:8px">${v.vinculo||'—'}</td>
      <td style="padding:8px">${v.cc||'—'}</td><td style="padding:8px">${v.km||'—'}</td>
      <td style="padding:8px">${fmtData(v.desde)||'—'}</td><td style="padding:8px">${fmtData(v.prazo)||'—'}</td>
      <td style="padding:8px">${v.valor?'R$ '+v.valor:'—'}</td><td style="padding:8px">${v.obs||'—'}</td>
    </tr>`).join('');
    document.getElementById('rel-tabela').innerHTML=`
      <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;font-size:12px;">
        <thead><tr style="background:var(--erg-blue);color:#fff;">
          <th style="padding:10px 8px;text-align:left">Placa</th><th style="padding:10px 8px;text-align:left">Status</th>
          <th style="padding:10px 8px;text-align:left">Tipo Manut.</th><th style="padding:10px 8px;text-align:left">Vínculo</th>
          <th style="padding:10px 8px;text-align:left">C.Custo</th><th style="padding:10px 8px;text-align:left">KM</th>
          <th style="padding:10px 8px;text-align:left">Início</th><th style="padding:10px 8px;text-align:left">Prazo</th>
          <th style="padding:10px 8px;text-align:left">Custo (R$)</th><th style="padding:10px 8px;text-align:left">Obs</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  }

  window.exportarExcel = function() {
    const dados = filtrarRelatorio().map(v=>({
      Placa:v.placa, Status:labelStatus(v.status), 'Tipo Manut.':v.tipoManut||'',
      Tipo:v.vinculo||'', 'C.Custo':v.cc||'', KM:v.km||'',
      Início:fmtData(v.desde)||'', Prazo:fmtData(v.prazo)||'',
      'Custo(R$)':v.valor||'', Observação:v.obs||''
    }));
    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Frota');
    XLSX.writeFile(wb,'relatorio_frota_erg.xlsx');
  };

  window.exportarPDF = function() {
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF({orientation:'landscape'});
    doc.setFontSize(14); doc.setTextColor(26,58,92);
    doc.text('ERG Engenharia — Relatório de Frotas',14,15);
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text('Gerado em: '+new Date().toLocaleDateString('pt-BR'),14,22);
    const cols = ['Placa','Status','Tipo Manut.','Vínculo','C.Custo','KM','Início','Prazo','Custo','Obs'];
    const rows = filtrarRelatorio().map(v=>[v.placa,labelStatus(v.status),v.tipoManut||'',v.vinculo||'',v.cc||'',v.km||'',fmtData(v.desde)||'',fmtData(v.prazo)||'',v.valor?'R$'+v.valor:'',v.obs||'']);
    let y=30;
    doc.setFillColor(26,58,92); doc.setTextColor(255); doc.rect(14,y-5,277,8,'F');
    cols.forEach((c,i)=>doc.text(c,16+i*28,y));
    y+=8; doc.setTextColor(50);
    rows.forEach((r,ri)=>{
      if(ri%2===0){doc.setFillColor(240,242,245);doc.rect(14,y-5,277,8,'F');}
      r.forEach((c,i)=>doc.text(String(c).substring(0,11),16+i*28,y));
      y+=8; if(y>190){doc.addPage();y=20;}
    });
    doc.save('relatorio_frota_erg.pdf');
  };

  window._toggleStatus = function() {
    const s        = document.getElementById('m-status').value;
    const temExtra = s!=='disponivel';
    const temLocal = ['manutencao','agendado','substituicao','concluido'].includes(s);
    const temPrazo = ['manutencao','mobilizacao','agendado','substituicao','concluido'].includes(s);
    const temLocac = ['locacao','concluido'].includes(s);
    document.getElementById('m-bloco-tipo-manut').style.display = s==='manutencao' ? '' : 'none';
    document.getElementById('m-bloco-comuns').style.display     = temExtra ? '' : 'none';
    document.getElementById('m-bloco-local').style.display      = temLocal ? '' : 'none';
    document.getElementById('m-bloco-prazo').style.display      = temPrazo ? '' : 'none';
    document.getElementById('m-bloco-locac').style.display      = temLocac ? '' : 'none';
    document.getElementById('m-bloco-obs').style.display        = temExtra ? '' : 'none';
    document.getElementById('lbl-placa').textContent            = s==='locacao' ? 'Veículo' : 'Placa / Identificação';
    document.getElementById('m-placa').placeholder              = s==='locacao' ? 'Ex: Hilux Prata' : 'Ex: QMY2A01';
  };

  window._filtrar          = function(s){filtroAtivo=filtroAtivo===s?null:s;render();};
  window._buscar           = function(v){buscaPlaca=v.trim();render();};
  window._filtrarData = function() {
    filtroDataDe  = document.getElementById('filtro-data-de').value;
    filtroDataAte = document.getElementById('filtro-data-ate').value;
    renderDashboard();
  };

  window._limparFiltrosDash = function() {
    filtroContrato = '';
    filtroDataDe   = '';
    filtroDataAte  = '';
    document.getElementById('filtro-contrato').value  = '';
    document.getElementById('filtro-data-de').value   = '';
    document.getElementById('filtro-data-ate').value  = '';
    document.getElementById('filtro-contrato-label').textContent = '';
    renderDashboard();
  };

  window._filtrarContrato  = function(v){
    filtroContrato=v.trim();
    renderDashboard();
  };
  window._closeModal       = function(){document.getElementById('modal').style.display='none';};

  window.openNew = function(){
    editId=null;
    document.getElementById('modal').innerHTML='<div class="modal-bg" onclick="if(event.target===this)window._closeModal()">'+modalHTML(null)+'</div>';
    document.getElementById('modal').style.display='';
  };
  window._openEdit = function(id){
    editId=id;
    const v=veiculos.find(x=>x.id===id);
    document.getElementById('modal').innerHTML='<div class="modal-bg" onclick="if(event.target===this)window._closeModal()">'+modalHTML(v)+'</div>';
    document.getElementById('modal').style.display='';
  };

  window._saveModal = async function() {
    const placa  = document.getElementById('m-placa').value.trim().toUpperCase();
    const status = document.getElementById('m-status').value;
    if (!placa) { alert('Informe a identificação do veículo.'); return; }

    const g = id => document.getElementById(id);
    const temExtra = status!=='disponivel';
    const cc               = temExtra&&g('m-cc')      ? g('m-cc').value.trim()      : '';
    const vinculo          = temExtra&&g('m-vinculo') ? g('m-vinculo').value         : '';
    const km               = temExtra&&g('m-km')      ? g('m-km').value.trim()       : '';
    const emailResponsavel = temExtra&&g('m-email')   ? g('m-email').value.trim()    : '';
    const obs              = temExtra&&g('m-obs')     ? g('m-obs').value.trim()      : '';
    const tipoManut        = status==='manutencao'&&g('m-tipoManut') ? g('m-tipoManut').value : '';

    let local='', desde='', prazo='', valor='', padrao='';
    if (['manutencao','agendado','substituicao','concluido'].includes(status)) local = g('m-local')?g('m-local').value.trim():'';
    if (['manutencao','mobilizacao','agendado','substituicao','concluido'].includes(status)) {
      desde = g('m-desde')?g('m-desde').value:'';
      prazo = g('m-prazo')?g('m-prazo').value:'';
    }
    if (['locacao','concluido'].includes(status)) {
      valor  = g('m-valor') ?g('m-valor').value.trim() :'';
      padrao = g('m-padrao')?g('m-padrao').value        :'';
    }
    if (status==='locacao') desde = g('m-desde-loc')?g('m-desde-loc').value:'';

    const vAnt           = editId ? veiculos.find(x=>x.id===editId) : null;
    const statusAnt      = vAnt ? vAnt.status : null;
    const estaConcluindo = status==='concluido' && statusAnt!=='concluido';
    const entrandoManut  = status==='manutencao' && statusAnt!=='manutencao';
    const entrandoAgend  = status==='agendado'   && statusAnt!=='agendado';
    const dataConclusao  = estaConcluindo ? hojeStr() : (vAnt?(vAnt.dataConclusao||''):'');
    
    try {
      const data = {placa,status,cc,vinculo,km,emailResponsavel,tipoManut,local,desde,prazo,obs,valor,padrao,dataConclusao};
      let novoId = editId;
      if (editId) { await updateDoc(doc(db,'veiculos',editId),data); }
      else        { const r=await addDoc(col,data); novoId=r.id; }

      const descHist = status===statusAnt
        ? 'Informações atualizadas ('+labelStatus(status)+')'
        : 'Status alterado: '+(statusAnt?labelStatus(statusAnt)+' → ':'')+labelStatus(status);
      if (novoId) await registrarHistorico(novoId, descHist);

      // Disparar e-mail sempre que o status mudar
      if (emailResponsavel && status !== statusAnt) {
        const titulos = {
          manutencao:   'O veículo abaixo entrou em manutenção:',
          mobilizacao:  'O veículo abaixo foi mobilizado:',
          agendado:     'Uma manutenção foi agendada para o veículo abaixo:',
          locacao:      'O veículo abaixo entrou em locação:',
          substituicao: 'O veículo abaixo está em substituição:',
          concluido:    'A demanda do veículo abaixo foi concluída:',
          disponivel:   'O veículo abaixo está disponível:',
        };
        const assuntos = {
          manutencao:   'ERG Frotas — Em manutenção: ',
          mobilizacao:  'ERG Frotas — Em mobilização: ',
          agendado:     'ERG Frotas — Manutenção agendada: ',
          locacao:      'ERG Frotas — Em locação: ',
          substituicao: 'ERG Frotas — Substituição: ',
          concluido:    'ERG Frotas — Demanda concluída: ',
          disponivel:   'ERG Frotas — Disponível: ',
        };
        const titulo  = titulos[status]  || 'Status atualizado:';
        const assunto = (assuntos[status] || 'ERG Frotas — Atualização: ') + placa;
        await enviarEmail(emailResponsavel, assunto, montarMsg(data, titulo));
        if (estaConcluindo) alert('✓ Concluído! E-mail enviado para os responsáveis.');
      }

      window._closeModal();
    } catch(e) { alert('Erro ao salvar: '+e.message); }
  };

  window._deleteVeiculo = async function() {
    if (!confirm('Remover este veículo?')) return;
    try { await deleteDoc(doc(db,'veiculos',editId)); window._closeModal(); }
    catch(e) { alert('Erro: '+e.message); }
  };

  onSnapshot(col,(snapshot)=>{
    veiculos=snapshot.docs.map(d=>({id:d.id,...d.data()}));
    veiculos.sort((a,b)=>a.placa.localeCompare(b.placa));
    render();
    document.getElementById('status-bar').textContent=
      'Atualizado em tempo real · '+veiculos.length+' veículo'+(veiculos.length!==1?'s':'')+' cadastrado'+(veiculos.length!==1?'s':'');
  },(e)=>{document.getElementById('status-bar').textContent='Erro: '+e.message;});

  document.getElementById('rel-status').addEventListener('change',renderRelatorio);
  document.getElementById('rel-vinculo').addEventListener('change',renderRelatorio);

  function updateClock(){
    const n=new Date();
    document.getElementById('clock').innerHTML=
      n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'})+
      '<br>'+n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  updateClock(); setInterval(updateClock,60000);
</script>

<script>
  function mudarAba(id,btn){
    document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativa'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('ativo'));
    document.getElementById('aba-'+id).classList.add('ativa');
    btn.classList.add('ativo');
  }
</script>
</body>
</html>
