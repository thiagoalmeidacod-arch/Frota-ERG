<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel de Frota — ERG Engenharia</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --erg-blue: #1a3a5c;
    --erg-orange: #e07020;
    --erg-blue-light: #2a5080;
    --font-sans: system-ui, -apple-system, sans-serif;
  }
  body { font-family: var(--font-sans); background: #f0f2f5; min-height: 100vh; }

  .header {
    background: var(--erg-blue);
    padding: 0;
    border-bottom: 4px solid var(--erg-orange);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 12px 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header-logo { display: flex; align-items: center; gap: 14px; }
  .header-logo img { height: 52px; border-radius: 6px; }
  .header-title { color: #fff; font-size: 20px; font-weight: 500; letter-spacing: 0.3px; }
  .header-title span { color: var(--erg-orange); }
  .header-clock { color: rgba(255,255,255,0.75); font-size: 12px; text-align: right; }

  .wrap { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

  .summary-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: center;
  }
  .badge { font-size: 13px; padding: 5px 14px; border-radius: 8px; font-weight: 500; }
  .badge-disp { background: #EAF3DE; color: #2d5a0e; }
  .badge-manut { background: #FCEBEB; color: #A32D2D; }
  .badge-mobil { background: #FEF3CD; color: #7a5200; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-top: 3px solid var(--erg-blue);
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(26,58,92,0.12); border-top-color: var(--erg-orange); }
  .card.manut { border-top-color: #E24B4A; }
  .card.manut:hover { border-top-color: #A32D2D; }
  .card.mobil { border-top-color: #f0b429; }
  .card.mobil:hover { border-top-color: #c88a00; }

  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-placa { font-size: 15px; font-weight: 600; color: var(--erg-blue); letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-disp { background: #639922; }
  .dot-manut { background: #E24B4A; }
  .dot-mobil { background: #f0b429; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 8px; font-weight: 500; }
  .tag-disp { background: #EAF3DE; color: #3B6D11; }
  .tag-manut { background: #FCEBEB; color: #A32D2D; }
  .tag-mobil { background: #FEF3CD; color: #7a5200; }
  .card-info { font-size: 12px; color: #666; line-height: 1.8; }
  .card-info span { color: #1a1a1a; font-weight: 500; }

  .add-btn { margin-top: 1.5rem; display: flex; justify-content: center; }
  button.add {
    font-size: 13px;
    padding: 9px 24px;
    border-radius: 8px;
    border: 1.5px solid var(--erg-orange);
    background: transparent;
    color: var(--erg-orange);
    cursor: pointer;
    font-family: var(--font-sans);
    font-weight: 500;
    transition: background 0.15s;
  }
  button.add:hover { background: rgba(224,112,32,0.08); }

  .status-bar { font-size: 11px; color: #999; text-align: center; margin-top: 1rem; }
  .loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal {
    background: #fff;
    border-radius: 12px;
    border-top: 4px solid var(--erg-orange);
    padding: 1.5rem;
    width: 330px;
    max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; color: var(--erg-blue); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 500; }
  .field input, .field select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
    color: #1a1a1a;
    font-family: var(--font-sans);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--erg-blue); }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-save {
    flex: 1;
    background: var(--erg-blue);
    border: none;
    border-radius: 8px;
    padding: 9px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    color: #fff;
    font-family: var(--font-sans);
    transition: background 0.15s;
  }
  .btn-save:hover { background: var(--erg-blue-light); }
  .btn-del {
    padding: 9px 14px;
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    color: #A32D2D;
    font-family: var(--font-sans);
  }
  .btn-del:hover { background: #FCEBEB; border-color: #f09595; }
  .btn-cancel {
    padding: 9px 14px;
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    color: #666;
    font-family: var(--font-sans);
  }
  .btn-cancel:hover { background: #f5f5f5; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-logo">
      <img src="logo.png" alt="ERG" onerror="this.style.display='none'" />
      <div>
        <div class="header-title">Painel de <span>Frota</span></div>
        <div style="color:rgba(255,255,255,0.6);font-size:11px;margin-top:2px;">ERG Engenharia · Meio Ambiente · Geotecnologias</div>
      </div>
    </div>
    <div class="header-clock" id="clock"></div>
  </div>
</div>

<div class="wrap">
  <div class="summary-row" id="summary"></div>
  <div id="grid" class="grid"><div class="loading">Carregando veículos...</div></div>
  <div class="add-btn">
    <button class="add" onclick="openNew()">+ Adicionar veículo</button>
  </div>
  <div class="status-bar" id="status-bar">Conectando ao banco de dados...</div>
</div>

<div id="modal" style="display:none"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBWurnJOeq29n0NncjnLlf_krpq19vPIkM",
    authDomain: "frota-erg.firebaseapp.com",
    projectId: "frota-erg",
    storageBucket: "frota-erg.firebasestorage.app",
    messagingSenderId: "267421435604",
    appId: "1:267421435604:web:ca257c03eb3ae420a41d41"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const col = collection(db, "veiculos");

  let veiculos = [];
  let editId = null;

  function diasDesde(data) {
    if (!data) return '';
    const d = new Date(data + 'T00:00:00');
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const diff = Math.round((hoje - d) / 86400000);
    if (diff === 0) return 'hoje';
    if (diff === 1) return '1 dia';
    return diff + ' dias';
  }

  function fmtData(data) {
    if (!data) return '';
    const [y, m, d] = data.split('-');
    return d + '/' + m + '/' + y;
  }

  function getStatusInfo(status) {
    if (status === 'manutencao') return { label: 'Manutenção', tagClass: 'tag-manut', dotClass: 'dot-manut', cardClass: 'manut' };
    if (status === 'mobilizacao') return { label: 'Em mobilização', tagClass: 'tag-mobil', dotClass: 'dot-mobil', cardClass: 'mobil' };
    return { label: 'Disponível', tagClass: 'tag-disp', dotClass: 'dot-disp', cardClass: '' };
  }

  function render() {
    const dispN = veiculos.filter(v => v.status === 'disponivel').length;
    const mautN = veiculos.filter(v => v.status === 'manutencao').length;
    const mobilN = veiculos.filter(v => v.status === 'mobilizacao').length;

    let badges = '<span class="badge badge-disp">' + dispN + ' disponível' + (dispN !== 1 ? 'is' : '') + '</span>';
    badges += '<span class="badge badge-manut">' + mautN + ' em manutenção</span>';
    badges += '<span class="badge badge-mobil">' + mobilN + ' em mobilização</span>';
    document.getElementById('summary').innerHTML = badges;

    if (veiculos.length === 0) {
      document.getElementById('grid').innerHTML = '<div class="loading">Nenhum veículo cadastrado. Clique em "+ Adicionar veículo" para começar.</div>';
      return;
    }

    document.getElementById('grid').innerHTML = veiculos.map(v => {
      const info = getStatusInfo(v.status);
      const dias = (v.status === 'manutencao' || v.status === 'mobilizacao') ? diasDesde(v.desde) : '';
      return '<div class="card ' + info.cardClass + '" onclick="window._openEdit(\'' + v.id + '\')">' +
        '<div class="card-header">' +
          '<span class="card-placa"><span class="dot ' + info.dotClass + '"></span>' + v.placa + '</span>' +
          '<span class="tag ' + info.tagClass + '">' + info.label + '</span>' +
        '</div>' +
        '<div class="card-info">' +
          (v.status === 'manutencao' && v.local ? 'Local: <span>' + v.local + '</span><br>' : '') +
          (v.status === 'mobilizacao' && v.cc ? 'C. Custo: <span>' + v.cc + '</span><br>' : '') +
          ((v.status === 'manutencao' || v.status === 'mobilizacao') && v.desde ? 'Desde: <span>' + fmtData(v.desde) + '</span>' + (dias ? ' <span style="color:#999">(' + dias + ')</span>' : '') + '<br>' : '') +
          (v.obs ? 'Obs: <span>' + v.obs + '</span>' : (v.status === 'disponivel' ? '<span style="color:#aaa">Sem ocorrências</span>' : '')) +
        '</div>' +
      '</div>';
    }).join('');
  }

  function modalHTML(v) {
    const status = v ? v.status : 'disponivel';
    const isMaut = status === 'manutencao';
    const isMobil = status === 'mobilizacao';
    return '<div class="modal">' +
      '<h2>' + (v ? 'Editar veículo' : 'Novo veículo') + '</h2>' +
      '<div class="field"><label>Placa / Identificação</label><input id="m-placa" type="text" value="' + (v ? v.placa : '') + '" placeholder="Ex: QMY2A01" /></div>' +
      '<div class="field"><label>Status</label>' +
        '<select id="m-status" onchange="window._toggleStatus()">' +
          '<option value="disponivel"' + (status === 'disponivel' ? ' selected' : '') + '>Disponível</option>' +
          '<option value="manutencao"' + (isMaut ? ' selected' : '') + '>Em manutenção</option>' +
          '<option value="mobilizacao"' + (isMobil ? ' selected' : '') + '>Em mobilização</option>' +
        '</select></div>' +
      '<div id="m-extra-manut" style="' + (isMaut ? '' : 'display:none') + '">' +
        '<div class="field"><label>Local</label><input id="m-local" type="text" value="' + (v && v.local ? v.local : '') + '" placeholder="Ex: Barão de Cocais" /></div>' +
      '</div>' +
      '<div id="m-extra-mobil" style="' + (isMobil ? '' : 'display:none') + '">' +
        '<div class="field"><label>Centro de Custo</label><input id="m-cc" type="text" value="' + (v && v.cc ? v.cc : '') + '" placeholder="Ex: 5970 VALE" /></div>' +
      '</div>' +
      '<div id="m-extra-comum" style="' + (isMaut || isMobil ? '' : 'display:none') + '">' +
        '<div class="field"><label>Data de entrada</label><input id="m-desde" type="date" value="' + (v && v.desde ? v.desde : '') + '" /></div>' +
        '<div class="field"><label>Observação</label><input id="m-obs" type="text" value="' + (v && v.obs ? v.obs : '') + '" placeholder="Ex: Troca de freio" /></div>' +
      '</div>' +
      '<div class="modal-btns">' +
        '<button class="btn-save" onclick="window._saveModal()">Salvar</button>' +
        (v ? '<button class="btn-del" onclick="window._deleteVeiculo()">Remover</button>' : '') +
        '<button class="btn-cancel" onclick="window._closeModal()">Cancelar</button>' +
      '</div></div>';
  }

  window._toggleStatus = function() {
    const s = document.getElementById('m-status').value;
    document.getElementById('m-extra-manut').style.display = s === 'manutencao' ? '' : 'none';
    document.getElementById('m-extra-mobil').style.display = s === 'mobilizacao' ? '' : 'none';
    document.getElementById('m-extra-comum').style.display = (s === 'manutencao' || s === 'mobilizacao') ? '' : 'none';
  };

  window._closeModal = function() {
    document.getElementById('modal').style.display = 'none';
  };

  window.openNew = function() {
    editId = null;
    document.getElementById('modal').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)window._closeModal()">' + modalHTML(null) + '</div>';
    document.getElementById('modal').style.display = '';
  };

  window._openEdit = function(id) {
    editId = id;
    const v = veiculos.find(x => x.id === id);
    document.getElementById('modal').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)window._closeModal()">' + modalHTML(v) + '</div>';
    document.getElementById('modal').style.display = '';
  };

  window._saveModal = async function() {
    const placa = document.getElementById('m-placa').value.trim().toUpperCase();
    const status = document.getElementById('m-status').value;
    const local = status === 'manutencao' ? document.getElementById('m-local').value.trim() : '';
    const cc = status === 'mobilizacao' ? document.getElementById('m-cc').value.trim() : '';
    const desde = (status === 'manutencao' || status === 'mobilizacao') ? document.getElementById('m-desde').value : '';
    const obs = (status === 'manutencao' || status === 'mobilizacao') ? document.getElementById('m-obs').value.trim() : '';
    if (!placa) { alert('Informe a placa do veículo.'); return; }
    try {
      if (editId) {
        await updateDoc(doc(db, 'veiculos', editId), { placa, status, local, cc, desde, obs });
      } else {
        await addDoc(col, { placa, status, local, cc, desde, obs });
      }
      window._closeModal();
    } catch(e) {
      alert('Erro ao salvar: ' + e.message);
    }
  };

  window._deleteVeiculo = async function() {
    if (!confirm('Remover este veículo?')) return;
    try {
      await deleteDoc(doc(db, 'veiculos', editId));
      window._closeModal();
    } catch(e) {
      alert('Erro ao remover: ' + e.message);
    }
  };

  onSnapshot(col, (snapshot) => {
    veiculos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    veiculos.sort((a, b) => a.placa.localeCompare(b.placa));
    render();
    document.getElementById('status-bar').textContent =
      'Atualizado em tempo real · ' + veiculos.length + ' veículo' + (veiculos.length !== 1 ? 's' : '') + ' cadastrado' + (veiculos.length !== 1 ? 's' : '');
  }, (error) => {
    document.getElementById('status-bar').textContent = 'Erro de conexão: ' + error.message;
  });

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerHTML =
      now.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' }) +
      '<br>' + now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 60000);
</script>
</body>
</html>
