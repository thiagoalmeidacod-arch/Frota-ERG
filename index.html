<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel de Frota</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --font-sans: system-ui, -apple-system, sans-serif;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f5;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #6b6b6b;
    --color-border-tertiary: rgba(0,0,0,0.12);
    --color-border-secondary: rgba(0,0,0,0.2);
    --color-border-primary: rgba(0,0,0,0.3);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1e1e1e;
      --color-background-secondary: #2a2a2a;
      --color-text-primary: #f0f0f0;
      --color-text-secondary: #a0a0a0;
      --color-border-tertiary: rgba(255,255,255,0.1);
      --color-border-secondary: rgba(255,255,255,0.18);
      --color-border-primary: rgba(255,255,255,0.28);
    }
  }
  body { font-family: var(--font-sans); background: var(--color-background-secondary); min-height: 100vh; }
  .wrap { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
  .title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .clock { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .summary { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 12px; padding: 4px 12px; border-radius: var(--border-radius-md); font-weight: 500; }
  .badge-disp { background: #EAF3DE; color: #3B6D11; }
  .badge-manut { background: #FCEBEB; color: #A32D2D; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .card { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1rem 1.25rem; cursor: pointer; transition: border 0.15s; }
  .card:hover { border: 0.5px solid var(--color-border-primary); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-placa { font-size: 15px; font-weight: 500; color: var(--color-text-primary); letter-spacing: 0.5px; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: var(--border-radius-md); font-weight: 500; }
  .tag-disp { background: #EAF3DE; color: #3B6D11; }
  .tag-manut { background: #FCEBEB; color: #A32D2D; }
  .card-info { font-size: 12px; color: var(--color-text-secondary); line-height: 1.7; }
  .card-info span { color: var(--color-text-primary); font-weight: 500; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot-disp { background: #639922; }
  .dot-manut { background: #E24B4A; }
  .add-btn { margin-top: 1.25rem; display: flex; justify-content: center; }
  button.add { font-size: 13px; padding: 8px 22px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; font-family: var(--font-sans); }
  button.add:hover { background: var(--color-background-secondary); }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1.5rem; width: 320px; max-width: 95vw; }
  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; color: var(--color-text-primary); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .field input, .field select { width: 100%; padding: 7px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; background: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-sans); }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-save { flex: 1; background: var(--color-background-primary); border: 0.5px solid var(--color-border-primary); border-radius: var(--border-radius-md); padding: 8px; font-size: 13px; cursor: pointer; font-weight: 500; color: var(--color-text-primary); font-family: var(--font-sans); }
  .btn-save:hover { background: var(--color-background-secondary); }
  .btn-del { padding: 8px 14px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; color: #A32D2D; font-family: var(--font-sans); }
  .btn-del:hover { background: #FCEBEB; }
  .btn-cancel { padding: 8px 14px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; color: var(--color-text-secondary); font-family: var(--font-sans); }
  .status-bar { font-size: 11px; color: var(--color-text-secondary); text-align: center; margin-top: 1rem; }
  .loading { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="title">Painel de frota</div>
      <div class="clock" id="clock"></div>
    </div>
    <div class="summary" id="summary"></div>
  </div>
  <div id="grid" class="grid"><div class="loading">Carregando veículos...</div></div>
  <div class="add-btn">
    <button class="add" onclick="openNew()">+ Adicionar veículo</button>
  </div>
  <div class="status-bar" id="status-bar">Conectando ao banco de dados...</div>
</div>

<div id="modal" style="display:none"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBWurnJOeq29n0NncjnLlf_krpq19vPIkM",
    authDomain: "frota-erg.firebaseapp.com",
    projectId: "frota-erg",
    storageBucket: "frota-erg.firebasestorage.app",
    messagingSenderId: "267421435604",
    appId: "1:267421435604:web:ca257c03eb3ae420a41d41"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const col = collection(db, "veiculos");

  let veiculos = [];
  let editId = null;

  function diasDesde(data) {
    if (!data) return '';
    const d = new Date(data + 'T00:00:00');
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const diff = Math.round((hoje - d) / 86400000);
    if (diff === 0) return 'hoje';
    if (diff === 1) return '1 dia';
    return diff + ' dias';
  }

  function fmtData(data) {
    if (!data) return '';
    const [y, m, d] = data.split('-');
    return d + '/' + m + '/' + y;
  }

  function render() {
    const dispN = veiculos.filter(v => v.status === 'disponivel').length;
    const mautN = veiculos.filter(v => v.status === 'manutencao').length;
    document.getElementById('summary').innerHTML =
      '<span class="badge badge-disp">' + dispN + ' disponível' + (dispN !== 1 ? 'is' : '') + '</span>' +
      '<span class="badge badge-manut">' + mautN + ' em manutenção</span>';

    if (veiculos.length === 0) {
      document.getElementById('grid').innerHTML = '<div class="loading">Nenhum veículo cadastrado. Clique em "+ Adicionar veículo" para começar.</div>';
      return;
    }

    document.getElementById('grid').innerHTML = veiculos.map(v => {
      const isMaut = v.status === 'manutencao';
      const dias = isMaut ? diasDesde(v.desde) : '';
      return '<div class="card" onclick="window._openEdit(\'' + v.id + '\')">' +
        '<div class="card-header">' +
          '<span class="card-placa"><span class="dot ' + (isMaut ? 'dot-manut' : 'dot-disp') + '"></span>' + v.placa + '</span>' +
          '<span class="tag ' + (isMaut ? 'tag-manut' : 'tag-disp') + '">' + (isMaut ? 'Manutenção' : 'Disponível') + '</span>' +
        '</div>' +
        '<div class="card-info">' +
          (isMaut && v.local ? 'Local: <span>' + v.local + '</span><br>' : '') +
          (isMaut && v.desde ? 'Desde: <span>' + fmtData(v.desde) + '</span>' + (dias ? ' <span style="color:var(--color-text-secondary)">(' + dias + ')</span>' : '') + '<br>' : '') +
          (v.obs ? 'Obs: <span>' + v.obs + '</span>' : (isMaut ? '' : '<span style="color:var(--color-text-secondary)">Sem ocorrências</span>')) +
        '</div>' +
      '</div>';
    }).join('');
  }

  function modalHTML(v) {
    const isMaut = v ? v.status === 'manutencao' : false;
    return '<div class="modal">' +
      '<h2>' + (v ? 'Editar veículo' : 'Novo veículo') + '</h2>' +
      '<div class="field"><label>Placa</label><input id="m-placa" type="text" value="' + (v ? v.placa : '') + '" placeholder="Ex: QMY2A04" /></div>' +
      '<div class="field"><label>Status</label>' +
        '<select id="m-status" onchange="window._toggleMaut()">' +
          '<option value="disponivel"' + (!isMaut ? ' selected' : '') + '>Disponível</option>' +
          '<option value="manutencao"' + (isMaut ? ' selected' : '') + '>Em manutenção</option>' +
        '</select></div>' +
      '<div id="m-extra" style="' + (isMaut ? '' : 'display:none') + '">' +
        '<div class="field"><label>Local</label><input id="m-local" type="text" value="' + (v && v.local ? v.local : '') + '" placeholder="Ex: Barão de Cocais" /></div>' +
        '<div class="field"><label>Data de entrada</label><input id="m-desde" type="date" value="' + (v && v.desde ? v.desde : '') + '" /></div>' +
        '<div class="field"><label>Observação</label><input id="m-obs" type="text" value="' + (v && v.obs ? v.obs : '') + '" placeholder="Ex: Troca de freio" /></div>' +
      '</div>' +
      '<div class="modal-btns">' +
        '<button class="btn-save" onclick="window._saveModal()">Salvar</button>' +
        (v ? '<button class="btn-del" onclick="window._deleteVeiculo()">Remover</button>' : '') +
        '<button class="btn-cancel" onclick="window._closeModal()">Cancelar</button>' +
      '</div></div>';
  }

  window._toggleMaut = function() {
    const s = document.getElementById('m-status').value;
    document.getElementById('m-extra').style.display = s === 'manutencao' ? '' : 'none';
  };

  window._closeModal = function() {
    document.getElementById('modal').style.display = 'none';
  };

  window.openNew = function() {
    editId = null;
    document.getElementById('modal').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)window._closeModal()">' + modalHTML(null) + '</div>';
    document.getElementById('modal').style.display = '';
  };

  window._openEdit = function(id) {
    editId = id;
    const v = veiculos.find(x => x.id === id);
    document.getElementById('modal').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)window._closeModal()">' + modalHTML(v) + '</div>';
    document.getElementById('modal').style.display = '';
  };

  window._saveModal = async function() {
    const placa = document.getElementById('m-placa').value.trim().toUpperCase();
    const status = document.getElementById('m-status').value;
    const local = status === 'manutencao' ? document.getElementById('m-local').value.trim() : '';
    const desde = status === 'manutencao' ? document.getElementById('m-desde').value : '';
    const obs = status === 'manutencao' ? document.getElementById('m-obs').value.trim() : '';
    if (!placa) { alert('Informe a placa do veículo.'); return; }
    try {
      if (editId) {
        await updateDoc(doc(db, 'veiculos', editId), { placa, status, local, desde, obs });
      } else {
        await addDoc(col, { placa, status, local, desde, obs });
      }
      window._closeModal();
    } catch(e) {
      alert('Erro ao salvar: ' + e.message);
    }
  };

  window._deleteVeiculo = async function() {
    if (!confirm('Remover este veículo?')) return;
    try {
      await deleteDoc(doc(db, 'veiculos', editId));
      window._closeModal();
    } catch(e) {
      alert('Erro ao remover: ' + e.message);
    }
  };

  // Escuta mudanças em tempo real
  onSnapshot(col, (snapshot) => {
    veiculos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    veiculos.sort((a, b) => a.placa.localeCompare(b.placa));
    render();
    document.getElementById('status-bar').textContent = 'Atualizado em tempo real · ' + veiculos.length + ' veículo' + (veiculos.length !== 1 ? 's' : '') + ' cadastrado' + (veiculos.length !== 1 ? 's' : '');
  }, (error) => {
    document.getElementById('status-bar').textContent = 'Erro de conexão: ' + error.message;
  });

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' }) +
      ' · ' + now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 60000);
</script>
</body>
</html>
