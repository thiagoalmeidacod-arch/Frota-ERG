<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota-ERG</title>
    <link rel="stylesheet" href="styles.css"> <!-- Assuming there is a CSS file to style the page -->
</head>
<body>
    <nav>
        <ul>
            <li><a href="#relatorio">Relatório</a></li>
            <li><a href="#planvoo">Plano de Voo</a></li> <!-- New Plano de Voo tab -->
        </ul>
    </nav>

    <section id="planvoo">
        <h2>Plano de Voo</h2>
        <input type="text" placeholder="Buscar por profissional" id="search" />
        <div class="grid-layout">
            <!-- Cards for atividades will be generated here -->
        </div>
        <button id="addActivity">Adicionar Atividade</button>
    </section>

    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-firestore.js"></script>
    <script>
        // Your web app's Firebase configuration
        var firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();

        // Functionality for managing atividades
        document.getElementById('addActivity').onclick = function() {
            const formData = {
                profissional: document.querySelector('#professionField').value,
                data: document.querySelector('#dateField').value,
                local_previsao: document.querySelector('#localField').value,
                tipo_demanda: document.querySelector('#demandTypeField').value,
                hora_saida: document.querySelector('#departureHourField').value,
                hora_retorno: document.querySelector('#returnHourField').value,
                // tempo_total calculated later
                status: document.querySelector('#statusField').value,
                placa_identificacao: document.querySelector('#plateField').value
            };

            db.collection('atividades').add(formData).then(() => {
                // Refresh or update grid layout
            }).catch(error => console.error(error));
        };

        // Fetching atividades from Firestore for the grid layout
        db.collection('atividades').get().then((querySnapshot) => {
            querySnapshot.forEach((doc) => {
                const activity = doc.data();
                // Display activity in grid layout
            });
        });
    </script>
</body>
</html>
