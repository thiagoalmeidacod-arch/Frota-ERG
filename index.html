<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestão de Frotas — ERG Engenharia</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --erg-blue: #1a3a5c;
    --erg-orange: #e07020;
    --erg-blue-light: #2a5080;
    --font-sans: system-ui, -apple-system, sans-serif;
  }
  body { font-family: var(--font-sans); background: #f0f2f5; min-height: 100vh; }

  .header { background: var(--erg-blue); padding: 0; border-bottom: 4px solid var(--erg-orange); }
  .header-inner {
    max-width: 1200px; margin: 0 auto; padding: 12px 1.5rem;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .header-logo { display: flex; align-items: center; gap: 14px; }
  .header-logo img { height: 52px; border-radius: 6px; }
  .header-title { color: #fff; font-size: 20px; font-weight: 500; }
  .header-title span { color: var(--erg-orange); }
  .header-clock { color: rgba(255,255,255,0.75); font-size: 12px; text-align: right; }

  .wrap { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

  .summary-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
  .badge { font-size: 12px; padding: 4px 12px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; user-select: none; }
  .badge:hover { opacity: 0.8; }
  .badge.ativo { border: 2px solid currentColor; box-shadow: 0 0 0 2px rgba(0,0,0,0.08); font-weight: 700; }
  .badge-disp   { background: #EAF3DE; color: #2d5a0e; }
  .badge-manut  { background: #FCEBEB; color: #A32D2D; }
  .badge-mobil  { background: #FEF3CD; color: #7a5200; }
  .badge-agend  { background: #DFF3E3; color: #1a6630; }
  .badge-locac  { background: #FCEBEB; color: #7a0000; }
  .badge-subst  { background: #FFF0E6; color: #7a3500; }
  .badge-conc   { background: #E6F1FB; color: #185FA5; }
  .filtro-label { font-size: 11px; color: #999; align-self: center; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }

  .card {
    background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1);
    border-top: 3px solid var(--erg-blue); padding: 1rem 1.25rem; cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .card:hover        { box-shadow: 0 2px 12px rgba(26,58,92,0.12); }
  .card.manut        { border-top-color: #E24B4A; }
  .card.mobil        { border-top-color: #f0b429; }
  .card.agend        { border-top-color: #3aad5c; }
  .card.locac        { border-top-color: #b00000; }
  .card.subst        { border-top-color: #e07020; }
  .card.concluido    { border-top-color: #378ADD; opacity: 0.85; }

  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 4px; }
  .card-placa  { font-size: 15px; font-weight: 600; color: var(--erg-blue); letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-disp      { background: #639922; }
  .dot-manut     { background: #E24B4A; }
  .dot-mobil     { background: #f0b429; }
  .dot-agend     { background: #3aad5c; }
  .dot-locac     { background: #b00000; }
  .dot-subst     { background: #e07020; }
  .dot-concluido { background: #378ADD; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 8px; font-weight: 500; }
  .tag-disp      { background: #EAF3DE; color: #3B6D11; }
  .tag-manut     { background: #FCEBEB; color: #A32D2D; }
  .tag-mobil     { background: #FEF3CD; color: #7a5200; }
  .tag-agend     { background: #DFF3E3; color: #1a6630; }
  .tag-locac     { background: #FCEBEB; color: #7a0000; }
  .tag-subst     { background: #FFF0E6; color: #7a3500; }
  .tag-concluido { background: #E6F1FB; color: #185FA5; }

  .card-info { font-size: 12px; color: #666; line-height: 1.8; margin-top: 4px; }
  .card-info span { color: #1a1a1a; font-weight: 500; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; flex-wrap: wrap; gap: 4px; }
  .vinculo-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
  .vinculo-proprio { background: #E6F1FB; color: #185FA5; }
  .vinculo-locado  { background: #FFF0E6; color: #7a3500; }
  .prazo-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
  .prazo-ok              { background: #EAF3DE; color: #2d5a0e; }
  .prazo-atraso          { background: #FCEBEB; color: #A32D2D; }
  .prazo-concluido-ok    { background: #EAF3DE; color: #2d5a0e; }
  .prazo-concluido-atraso{ background: #FCEBEB; color: #A32D2D; }

  .add-btn { margin-top: 1.5rem; display: flex; justify-content: center; }
  button.add {
    font-size: 13px; padding: 9px 24px; border-radius: 8px;
    border: 1.5px solid var(--erg-orange); background: transparent;
    color: var(--erg-orange); cursor: pointer; font-family: var(--font-sans);
    font-weight: 500; transition: background 0.15s;
  }
  button.add:hover { background: rgba(224,112,32,0.08); }

  .status-bar { font-size: 11px; color: #999; text-align: center; margin-top: 1rem; }
  .loading    { text-align: center; padding: 2rem; color: #888; font-size: 14px; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal {
    background: #fff; border-radius: 12px; border-top: 4px solid var(--erg-orange);
    padding: 1.5rem; width: 340px; max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18); max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; color: var(--erg-blue); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 500; }
  .field input, .field select {
    width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 13px; background: #fff; color: #1a1a1a; font-family: var(--font-sans);
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--erg-blue); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-save {
    flex: 1; background: var(--erg-blue); border: none; border-radius: 8px;
    padding: 9px; font-size: 13px; cursor: pointer; font-weight: 600; color: #fff;
    font-family: var(--font-sans); transition: background 0.15s;
  }
  .btn-save:hover { background: var(--erg-blue-light); }
  .btn-del {
    padding: 9px 14px; background: transparent; border: 1px solid #ddd;
    border-radius: 8px; font-size: 13px; cursor: pointer; color: #A32D2D; font-family: var(--font-sans);
  }
  .btn-del:hover { background: #FCEBEB; }
  .btn-cancel {
    padding: 9px 14px; background: transparent; border: 1px solid #ddd;
    border-radius: 8px; font-size: 13px; cursor: pointer; color: #666; font-family: var(--font-sans);
  }
  .btn-cancel:hover { background: #f5f5f5; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-logo">
      <img src="logo.png" alt="ERG" onerror="this.style.display='none'" />
      <div>
        <div class="header-title">Gestão de <span>Frotas</span></div>
        <div style="color:rgba(255,255,255,0.6);font-size:11px;margin-top:2px;">ERG Engenharia · Meio Ambiente · Geotecnologias</div>
      </div>
    </div>
    <div class="header-clock" id="clock"></div>
  </div>
</div>

<div class="wrap">
  <div class="summary-row" id="summary"></div>
  <div id="grid" class="grid"><div class="loading">Carregando veículos...</div></div>
  <div class="add-btn">
    <button class="add" onclick="openNew()">+ Adicionar veículo</button>
  </div>
  <div class="status-bar" id="status-bar">Conectando ao banco de dados...</div>
</div>

<div id="modal" style="display:none"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import emailjs from "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/+esm";

  emailjs.init('55ZqdyFKq56zbhXgu');

  const firebaseConfig = {
    apiKey: "AIzaSyBWurnJOeq29n0NncjnLlf_krpq19vPIkM",
    authDomain: "frota-erg.firebaseapp.com",
    projectId: "frota-erg",
    storageBucket: "frota-erg.firebasestorage.app",
    messagingSenderId: "267421435604",
    appId: "1:267421435604:web:ca257c03eb3ae420a41d41"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const col = collection(db, "veiculos");

  let veiculos = [];
  let editId   = null;
  let filtroAtivo = null;

  function fmtData(data) {
    if (!data) return '';
    const [y, m, d] = data.split('-');
    return d + '/' + m + '/' + y;
  }

  function diasDesde(data) {
    if (!data) return '';
    const d    = new Date(data + 'T00:00:00');
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const diff = Math.round((hoje - d) / 86400000);
    if (diff === 0) return 'hoje';
    if (diff === 1) return '1 dia';
    return diff + ' dias';
  }

  function verificaPrazo(dataLimite) {
    if (!dataLimite) return null;
    const limite = new Date(dataLimite + 'T00:00:00');
    const hoje   = new Date(); hoje.setHours(0,0,0,0);
    return limite < hoje ? 'atraso' : 'ok';
  }

  function tagPrazoHTML(v) {
    if (v.status === 'disponivel') return '';
    const dataLimite = v.status === 'locacao' ? v.desde : v.prazo;
    if (v.status === 'concluido') {
      if (!dataLimite || !v.dataConclusao) return '';
      const limite    = new Date(dataLimite      + 'T00:00:00');
      const concluido = new Date(v.dataConclusao + 'T00:00:00');
      return concluido > limite
        ? '<span class="prazo-tag prazo-concluido-atraso">✓ Concluído em atraso</span>'
        : '<span class="prazo-tag prazo-concluido-ok">✓ Concluído no prazo</span>';
    }
    const st = verificaPrazo(dataLimite);
    if (!st) return '';
    return st === 'atraso'
      ? '<span class="prazo-tag prazo-atraso">⚠ Em atraso</span>'
      : '<span class="prazo-tag prazo-ok">✓ No prazo</span>';
  }

  function tagVinculoHTML(vinculo) {
    if (!vinculo) return '';
    return vinculo === 'Próprio'
      ? '<span class="vinculo-tag vinculo-proprio">Próprio</span>'
      : '<span class="vinculo-tag vinculo-locado">Locado</span>';
  }

  function getStatusInfo(status) {
    if (status === 'manutencao')   return { label: 'Manutenção',      tagClass: 'tag-manut',     dotClass: 'dot-manut',     cardClass: 'manut'     };
    if (status === 'mobilizacao')  return { label: 'Em mobilização',  tagClass: 'tag-mobil',     dotClass: 'dot-mobil',     cardClass: 'mobil'     };
    if (status === 'agendado')     return { label: 'Manut. agendada', tagClass: 'tag-agend',     dotClass: 'dot-agend',     cardClass: 'agend'     };
    if (status === 'locacao')      return { label: 'Locação',         tagClass: 'tag-locac',     dotClass: 'dot-locac',     cardClass: 'locac'     };
    if (status === 'substituicao') return { label: 'Substituição',    tagClass: 'tag-subst',     dotClass: 'dot-subst',     cardClass: 'subst'     };
    if (status === 'concluido')    return { label: 'Concluído',       tagClass: 'tag-concluido', dotClass: 'dot-concluido', cardClass: 'concluido' };
    return                                { label: 'Disponível',      tagClass: 'tag-disp',      dotClass: 'dot-disp',      cardClass: ''          };
  }

  async function enviarEmailConclusao(v) {
    if (!v.emailResponsavel) return;
    const linhas = [
      'Olá,',
      '',
      'A demanda do veículo abaixo foi concluída:',
      '',
      'Veículo: ' + v.placa,
      'Tipo: ' + (v.vinculo || '—'),
      'Centro de Custo: ' + (v.cc || '—'),
      v.local  ? 'Local: '              + v.local          : null,
      v.desde  ? 'Data de início: '     + fmtData(v.desde) : null,
      v.prazo  ? 'Prazo de conclusão: ' + fmtData(v.prazo) : null,
      v.valor  ? 'Valor previsto: R$ '  + v.valor          : null,
      v.padrao ? 'Padrão: '             + v.padrao         : null,
      v.obs    ? 'Observação: '         + v.obs            : null,
      '',
      'Atenciosamente,',
      'ERG Engenharia — Gestão de Frotas',
    ].filter(l => l !== null).join('\n');

    await emailjs.send('service_mc9majh', 'template_2xdqcfs', {
      to_email: v.emailResponsavel,
      subject:  'ERG Frotas — Demanda concluída: ' + v.placa,
      message:  linhas,
    });
  }

  function render() {
    const counts = { disponivel:0, manutencao:0, mobilizacao:0, agendado:0, locacao:0, substituicao:0, concluido:0 };
    veiculos.forEach(v => { if (counts[v.status] !== undefined) counts[v.status]++; });

    const a = filtroAtivo;
    document.getElementById('summary').innerHTML =
      '<span class="badge badge-disp '  + (a==='disponivel'   ? 'ativo' : '') + '" onclick="window._filtrar(\'disponivel\')">'   + counts.disponivel   + (counts.disponivel   === 1 ? ' disponível'      : ' disponíveis')      + '</span>' +
      '<span class="badge badge-manut ' + (a==='manutencao'   ? 'ativo' : '') + '" onclick="window._filtrar(\'manutencao\')">'   + counts.manutencao   + (counts.manutencao   === 1 ? ' em manutenção'   : ' em manutenção')    + '</span>' +
      '<span class="badge badge-mobil ' + (a==='mobilizacao'  ? 'ativo' : '') + '" onclick="window._filtrar(\'mobilizacao\')">'  + counts.mobilizacao  + (counts.mobilizacao  === 1 ? ' em mobilização'  : ' em mobilização')   + '</span>' +
      '<span class="badge badge-agend ' + (a==='agendado'     ? 'ativo' : '') + '" onclick="window._filtrar(\'agendado\')">'     + counts.agendado     + (counts.agendado     === 1 ? ' manut. agendada' : ' manut. agendadas') + '</span>' +
      '<span class="badge badge-locac ' + (a==='locacao'      ? 'ativo' : '') + '" onclick="window._filtrar(\'locacao\')">'      + counts.locacao      + (counts.locacao      === 1 ? ' em locação'      : ' em locação')       + '</span>' +
      '<span class="badge badge-subst ' + (a==='substituicao' ? 'ativo' : '') + '" onclick="window._filtrar(\'substituicao\')">' + counts.substituicao + (counts.substituicao === 1 ? ' substituição'    : ' substituições')    + '</span>' +
      '<span class="badge badge-conc '  + (a==='concluido'    ? 'ativo' : '') + '" onclick="window._filtrar(\'concluido\')">'    + counts.concluido    + (counts.concluido    === 1 ? ' concluído'       : ' concluídos')       + '</span>' +
      (filtroAtivo ? '<span class="filtro-label" style="cursor:pointer;" onclick="window._filtrar(null)">✕ limpar filtro</span>' : '');

    const lista = filtroAtivo ? veiculos.filter(v => v.status === filtroAtivo) : veiculos;

    if (lista.length === 0) {
      document.getElementById('grid').innerHTML = '<div class="loading">' + (filtroAtivo ? 'Nenhum veículo com esse status.' : 'Nenhum veículo cadastrado. Clique em "+ Adicionar veículo" para começar.') + '</div>';
      return;
    }

    document.getElementById('grid').innerHTML = lista.map(v => {
      const info = getStatusInfo(v.status);
      let infoLines = '';
      if (v.cc) infoLines += 'C. Custo: <span>' + v.cc + '</span><br>';

      if (v.status === 'manutencao' || v.status === 'substituicao') {
        if (v.local)  infoLines += 'Local: <span>' + v.local + '</span><br>';
        if (v.desde)  infoLines += 'Início: <span>' + fmtData(v.desde) + '</span> <span style="color:#999">(' + diasDesde(v.desde) + ')</span><br>';
        if (v.prazo)  infoLines += 'Prazo: <span>' + fmtData(v.prazo) + '</span><br>';
      } else if (v.status === 'mobilizacao') {
        if (v.desde)  infoLines += 'Início: <span>' + fmtData(v.desde) + '</span> <span style="color:#999">(' + diasDesde(v.desde) + ')</span><br>';
        if (v.prazo)  infoLines += 'Prazo: <span>' + fmtData(v.prazo) + '</span><br>';
      } else if (v.status === 'agendado') {
        if (v.local)  infoLines += 'Local: <span>' + v.local + '</span><br>';
        if (v.desde)  infoLines += 'Início: <span>' + fmtData(v.desde) + '</span><br>';
        if (v.prazo)  infoLines += 'Conclusão: <span>' + fmtData(v.prazo) + '</span><br>';
      } else if (v.status === 'locacao') {
        if (v.padrao) infoLines += 'Padrão: <span>' + v.padrao + '</span><br>';
        if (v.valor)  infoLines += 'Valor prev.: <span>R$ ' + v.valor + '</span><br>';
        if (v.desde)  infoLines += 'Data limite: <span>' + fmtData(v.desde) + '</span><br>';
      } else if (v.status === 'concluido') {
        if (v.local)  infoLines += 'Local: <span>' + v.local + '</span><br>';
        if (v.desde)  infoLines += 'Início: <span>' + fmtData(v.desde) + '</span><br>';
        if (v.prazo)  infoLines += 'Prazo: <span>' + fmtData(v.prazo) + '</span><br>';
        if (v.valor)  infoLines += 'Valor prev.: <span>R$ ' + v.valor + '</span><br>';
        if (v.padrao) infoLines += 'Padrão: <span>' + v.padrao + '</span><br>';
      } else {
        infoLines += '<span style="color:#aaa">Sem ocorrências</span>';
      }

      if (v.obs) infoLines += 'Obs: <span>' + v.obs + '</span>';
      if (v.emailResponsavel) infoLines += '<br>Resp.: <span>' + v.emailResponsavel + '</span>';

      return '<div class="card ' + info.cardClass + '" onclick="window._openEdit(\'' + v.id + '\')">' +
        '<div class="card-header">' +
          '<span class="card-placa"><span class="dot ' + info.dotClass + '"></span>' + v.placa + '</span>' +
          '<span class="tag ' + info.tagClass + '">' + info.label + '</span>' +
        '</div>' +
        '<div class="card-info">' + infoLines + '</div>' +
        '<div class="card-footer">' + tagVinculoHTML(v.vinculo) + tagPrazoHTML(v) + '</div>' +
      '</div>';
    }).join('');
  }

  function camposComuns(v) {
    const vinculo = v ? (v.vinculo || '') : '';
    return '<div class="two-col">' +
      '<div class="field"><label>Centro de Custo</label>' +
        '<input id="m-cc" type="text" value="' + (v && v.cc ? v.cc : '') + '" placeholder="Ex: 5970" /></div>' +
      '<div class="field"><label>Tipo</label>' +
        '<select id="m-vinculo">' +
          '<option value=""'        + (!vinculo              ? ' selected' : '') + '>Selecione...</option>' +
          '<option value="Próprio"' + (vinculo === 'Próprio' ? ' selected' : '') + '>Próprio</option>' +
          '<option value="Locado"'  + (vinculo === 'Locado'  ? ' selected' : '') + '>Locado</option>' +
        '</select></div>' +
    '</div>' +
    '<div class="field"><label>E-mail do responsável</label>' +
      '<input id="m-email" type="email" value="' + (v && v.emailResponsavel ? v.emailResponsavel : '') + '" placeholder="responsavel@empresa.com" /></div>';
  }

  function modalHTML(v) {
    const status  = v ? v.status : 'disponivel';
    const isMaut  = status === 'manutencao';
    const isMobil = status === 'mobilizacao';
    const isAgend = status === 'agendado';
    const isLocac = status === 'locacao';
    const isSubst = status === 'substituicao';
    const isConc  = status === 'concluido';
    const temExtra = status !== 'disponivel';
    const temLocal = isMaut || isAgend || isSubst || isConc;
    const temPrazo = isMaut || isMobil || isAgend || isSubst || isConc;
    const temLocac = isLocac || isConc;

    return '<div class="modal">' +
      '<h2>' + (v ? 'Editar veículo' : 'Novo veículo') + '</h2>' +

      '<div class="field"><label id="lbl-placa">' + (isLocac ? 'Veículo' : 'Placa / Identificação') + '</label>' +
        '<input id="m-placa" type="text" value="' + (v ? v.placa : '') + '" placeholder="' + (isLocac ? 'Ex: Hilux Prata' : 'Ex: QMY2A01') + '" /></div>' +

      '<div class="field"><label>Status</label>' +
        '<select id="m-status" onchange="window._toggleStatus()">' +
          '<option value="disponivel"'   + (status === 'disponivel'   ? ' selected' : '') + '>Disponível</option>' +
          '<option value="manutencao"'   + (isMaut   ? ' selected' : '') + '>Em manutenção</option>' +
          '<option value="mobilizacao"'  + (isMobil  ? ' selected' : '') + '>Em mobilização</option>' +
          '<option value="agendado"'     + (isAgend  ? ' selected' : '') + '>Manutenção agendada</option>' +
          '<option value="locacao"'      + (isLocac  ? ' selected' : '') + '>Locação</option>' +
          '<option value="substituicao"' + (isSubst  ? ' selected' : '') + '>Substituição</option>' +
          '<option value="concluido"'    + (isConc   ? ' selected' : '') + '>Concluído</option>' +
        '</select></div>' +

      '<div id="m-bloco-comuns" style="' + (temExtra ? '' : 'display:none') + '">' + camposComuns(v) + '</div>' +

      '<div id="m-bloco-local" style="' + (temLocal ? '' : 'display:none') + '">' +
        '<div class="field"><label>Local</label><input id="m-local" type="text" value="' + (v && v.local ? v.local : '') + '" placeholder="Ex: Barão de Cocais" /></div>' +
      '</div>' +

      '<div id="m-bloco-prazo" style="' + (temPrazo ? '' : 'display:none') + '">' +
        '<div class="field"><label>Data de início</label><input id="m-desde" type="date" value="' + (v && v.desde ? v.desde : '') + '" /></div>' +
        '<div class="field"><label>Prazo de conclusão</label><input id="m-prazo" type="date" value="' + (v && v.prazo ? v.prazo : '') + '" /></div>' +
      '</div>' +

      '<div id="m-bloco-locac" style="' + (temLocac ? '' : 'display:none') + '">' +
        '<div class="field"><label>Valor Previsto (R$)</label><input id="m-valor" type="text" inputmode="decimal" value="' + (v && v.valor ? v.valor : '') + '" placeholder="Ex: 3.500,00" /></div>' +
        '<div class="field"><label>Padrão</label>' +
          '<select id="m-padrao">' +
            '<option value=""' + (!v || !v.padrao ? ' selected' : '') + '>Selecione...</option>' +
            ['Vale','Samarco','Anglo','Arcelor','Usiminas','Sem Padronização'].map(p =>
              '<option value="' + p + '"' + (v && v.padrao === p ? ' selected' : '') + '>' + p + '</option>'
            ).join('') +
          '</select></div>' +
        (isLocac ? '<div class="field"><label>Data Limite</label><input id="m-desde-loc" type="date" value="' + (v && v.desde ? v.desde : '') + '" /></div>' : '') +
      '</div>' +

      '<div id="m-bloco-obs" style="' + (temExtra ? '' : 'display:none') + '">' +
        '<div class="field"><label>Observação</label><input id="m-obs" type="text" value="' + (v && v.obs ? v.obs : '') + '" placeholder="Ex: Troca de freio" /></div>' +
      '</div>' +

      '<div class="modal-btns">' +
        '<button class="btn-save" onclick="window._saveModal()">Salvar</button>' +
        (v ? '<button class="btn-del" onclick="window._deleteVeiculo()">Remover</button>' : '') +
        '<button class="btn-cancel" onclick="window._closeModal()">Cancelar</button>' +
      '</div></div>';
  }

  window._toggleStatus = function() {
    const s        = document.getElementById('m-status').value;
    const temExtra = s !== 'disponivel';
    const temLocal = ['manutencao','agendado','substituicao','concluido'].includes(s);
    const temPrazo = ['manutencao','mobilizacao','agendado','substituicao','concluido'].includes(s);
    const temLocac = ['locacao','concluido'].includes(s);
    document.getElementById('m-bloco-comuns').style.display = temExtra ? '' : 'none';
    document.getElementById('m-bloco-local').style.display  = temLocal ? '' : 'none';
    document.getElementById('m-bloco-prazo').style.display  = temPrazo ? '' : 'none';
    document.getElementById('m-bloco-locac').style.display  = temLocac ? '' : 'none';
    document.getElementById('m-bloco-obs').style.display    = temExtra ? '' : 'none';
    document.getElementById('lbl-placa').textContent        = s === 'locacao' ? 'Veículo' : 'Placa / Identificação';
    document.getElementById('m-placa').placeholder          = s === 'locacao' ? 'Ex: Hilux Prata' : 'Ex: QMY2A01';
  };

  window._filtrar = function(status) {
    filtroAtivo = filtroAtivo === status ? null : status;
    render();
  };

  window._closeModal = function() { document.getElementById('modal').style.display = 'none'; };

  window.openNew = function() {
    editId = null;
    document.getElementById('modal').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)window._closeModal()">' + modalHTML(null) + '</div>';
    document.getElementById('modal').style.display = '';
  };

  window._openEdit = function(id) {
    editId = id;
    const v = veiculos.find(x => x.id === id);
    document.getElementById('modal').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)window._closeModal()">' + modalHTML(v) + '</div>';
    document.getElementById('modal').style.display = '';
  };

  window._saveModal = async function() {
    const placa  = document.getElementById('m-placa').value.trim().toUpperCase();
    const status = document.getElementById('m-status').value;
    if (!placa) { alert('Informe a identificação do veículo.'); return; }

    const cc               = temExtra(status) ? (document.getElementById('m-cc')      ? document.getElementById('m-cc').value.trim()      : '') : '';
    const vinculo          = temExtra(status) ? (document.getElementById('m-vinculo') ? document.getElementById('m-vinculo').value         : '') : '';
    const emailResponsavel = temExtra(status) ? (document.getElementById('m-email')   ? document.getElementById('m-email').value.trim()    : '') : '';
    const obs              = temExtra(status) ? (document.getElementById('m-obs')     ? document.getElementById('m-obs').value.trim()      : '') : '';

    let local = '', desde = '', prazo = '', valor = '', padrao = '';

    if (['manutencao','agendado','substituicao','concluido'].includes(status))
      local = document.getElementById('m-local') ? document.getElementById('m-local').value.trim() : '';
    if (['manutencao','mobilizacao','agendado','substituicao','concluido'].includes(status)) {
      desde = document.getElementById('m-desde') ? document.getElementById('m-desde').value : '';
      prazo = document.getElementById('m-prazo') ? document.getElementById('m-prazo').value : '';
    }
    if (['locacao','concluido'].includes(status)) {
      valor  = document.getElementById('m-valor')  ? document.getElementById('m-valor').value.trim()  : '';
      padrao = document.getElementById('m-padrao') ? document.getElementById('m-padrao').value         : '';
    }
    if (status === 'locacao')
      desde = document.getElementById('m-desde-loc') ? document.getElementById('m-desde-loc').value : '';

    const vAnterior   = editId ? veiculos.find(x => x.id === editId) : null;
    const estaConcluindo = status === 'concluido' && (!vAnterior || vAnterior.status !== 'concluido');

    try {
      const hoje = new Date().toISOString().split('T')[0];
      const dataConclusao = estaConcluindo ? hoje : (vAnterior ? (vAnterior.dataConclusao || '') : '');
      const data = { placa, status, cc, vinculo, emailResponsavel, local, desde, prazo, obs, valor, padrao, dataConclusao };
      if (editId) { await updateDoc(doc(db, 'veiculos', editId), data); }
      else        { await addDoc(col, data); }

      if (estaConcluindo && emailResponsavel) {
        await enviarEmailConclusao(data);
        alert('✓ Demanda concluída! E-mail enviado para ' + emailResponsavel);
      }
      window._closeModal();
    } catch(e) {
      alert('Erro ao salvar: ' + e.message);
    }
  };

  function temExtra(s) { return s !== 'disponivel'; }

  window._deleteVeiculo = async function() {
    if (!confirm('Remover este veículo?')) return;
    try { await deleteDoc(doc(db, 'veiculos', editId)); window._closeModal(); }
    catch(e) { alert('Erro ao remover: ' + e.message); }
  };

  onSnapshot(col, (snapshot) => {
    veiculos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    veiculos.sort((a, b) => a.placa.localeCompare(b.placa));
    render();
    document.getElementById('status-bar').textContent =
      'Atualizado em tempo real · ' + veiculos.length + ' veículo' + (veiculos.length !== 1 ? 's' : '') + ' cadastrado' + (veiculos.length !== 1 ? 's' : '');
  }, (error) => {
    document.getElementById('status-bar').textContent = 'Erro de conexão: ' + error.message;
  });

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerHTML =
      now.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' }) +
      '<br>' + now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 60000);
</script>
</body>
</html>
