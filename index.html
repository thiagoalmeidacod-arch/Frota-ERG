<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota ERG</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore.js"></script>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Atividades</a></li>
            <li><a href="#" id="planoVooTab">Plano de Voo</a></li>
        </ul>
    </nav>

    <div id="planoVooSection">
        <h2>Plano de Voo</h2>
        <input type="text" id="searchProfessional" placeholder="Buscar por profissional">
        <select id="demandTypeFilter">
            <option value="">Filtrar por tipo de demanda</option>
            <option value="tipo1">Tipo 1</option>
            <option value="tipo2">Tipo 2</option>
        </select>
        <div id="activitiesContainer"></div>
        <button onclick="openModal()">Adicionar Atividade</button>
    </div>

    <div id="activityModal">
        <h2 id="modalTitle">Adicionar Atividade</h2>
        <form id="activityForm">
            <label for="profissional">Profissional:</label>
            <input type="text" id="profissional" required>
            <label for="data">Data:</label>
            <input type="date" id="data" required>
            <label for="localPrevisto">Local Previsto:</label>
            <input type="text" id="localPrevisto" required>
            <label for="tipoDemanda">Tipo de Demanda:</label>
            <select id="tipoDemanda">
                <option value="">Selecionar</option>
                <option value="tipo1">Tipo 1</option>
                <option value="tipo2">Tipo 2</option>
            </select>
            <label for="horaSaida">Hora Saída:</label>
            <input type="time" id="horaSaida" required>
            <label for="horaRetorno">Hora Retorno:</label>
            <input type="time" id="horaRetorno" required>
            <label for="status">Status:</label>
            <input type="text" id="status">
            <label for="placaIdentificacao">Placa/Identificação:</label>
            <input type="text" id="placaIdentificacao">
            <button type="submit">Salvar</button>
            <button type="button" onclick="closeModal()">Fechar</button>
        </form>
    </div>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // CRUD Functions
        const openModal = () => {
            document.getElementById('activityModal').style.display = 'block';
        };

        const closeModal = () => {
            document.getElementById('activityModal').style.display = 'none';
        };

        document.getElementById('activityForm').onsubmit = (e) => {
            e.preventDefault();
            const profissional = document.getElementById('profissional').value;
            const data = document.getElementById('data').value;
            const localPrevisto = document.getElementById('localPrevisto').value;
            const tipoDemanda = document.getElementById('tipoDemanda').value;
            const horaSaida = document.getElementById('horaSaida').value;
            const horaRetorno = document.getElementById('horaRetorno').value;
            const status = document.getElementById('status').value;
            const placaIdentificacao = document.getElementById('placaIdentificacao').value;
            const tempoTotal = calculateTotalTime(horaSaida, horaRetorno);

            db.collection('atividades').add({
                profissional,
                data,
                localPrevisto,
                tipoDemanda,
                horaSaida,
                horaRetorno,
                tempoTotal,
                status,
                placaIdentificacao
            }).then(() => {
                closeModal();
                alert('Atividade adicionada!');
                // Refresh activities
            });
        };

        const calculateTotalTime = (horaSaida, horaRetorno) => {
            // Logic to calculate total time
        };
    </script>
</body>
</html>
